# アプリケーション名（ログ等に出る）
spring.application.name=ExpenseTrackerApp

# ===== データベース接続 =====
# PostgreSQL の接続URL。localhost / 5433 / expense_tracker という想定（環境に合わせて変える）
# ※事前に psql 等で「CREATE DATABASE expense_tracker;」を実行しておくこと
spring.datasource.url=jdbc:postgresql://localhost:5433/expense_tracker
# DBログインユーザー（PostgreSQL デフォルトの postgres）
spring.datasource.username=postgres
# DBログインパスワード（環境に合わせて変える）
spring.datasource.password=123456
# PostgreSQL の JDBC ドライバ
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
# 起動時に Entity からテーブルを「自動で更新」する設定
#   - create   ：毎回 DROP→CREATE（既存データ全消去）
#   - update   ：差分があれば ALTER／無ければ何もしない（学習向き）
#   - validate ：差分があったらエラーにする（本番向き）
#   - none     ：何もしない
spring.jpa.hibernate.ddl-auto=update
# 実行されたSQLをコンソールに出力する（学習用に true、本番では false）
spring.jpa.show-sql=true
# 出力されるSQLを整形して読みやすくする
spring.jpa.properties.hibernate.format_sql=true
# PostgreSQL 用の方言（Boot 3.x 以降は通常自動判定だが、明示しておくと安心）
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== サーバー =====
# アプリの待ち受けポート（デフォルト 8080）
server.port=8080
