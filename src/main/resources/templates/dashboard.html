<!DOCTYPE html>
<!-- Thymeleafの名前空間を宣言する -->
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<!-- 共通headフラグメントを引数 'ダッシュボード' で呼び出す -->
<head th:replace="~{fragments/layout :: head('ダッシュボード')}"></head>

<!-- 本文。下部ナビと重ならないよう下に余白(pb-24)を取る -->
<body class="min-h-screen bg-gray-50 text-gray-800 font-sans pb-24">

    <!-- 共通ヘッダー（利用者名＋ログアウト）を差し込む -->
    <header th:replace="~{fragments/layout :: appHeader(${userName})}"></header>

    <!-- メインコンテンツ -->
    <main class="max-w-3xl mx-auto p-4 space-y-6">

        <!-- 月の選択ドロップダウン -->
        <form method="get" th:action="@{/dashboard}" class="flex justify-end">
            <!-- 選んだ瞬間に送信する（onchange="this.form.submit()"）。選択肢は availableMonths -->
            <select name="month" onchange="this.form.submit()"
                    class="bg-white border border-gray-200 text-sm font-bold text-gray-700 rounded-xl px-3 py-2">
                <!-- 各月を option にする。selectedMonth と一致するものを選択状態にする -->
                <option th:each="m : ${availableMonths}" th:value="${m}"
                        th:text="${#strings.substring(m,0,4)} + '年' + ${T(java.lang.Integer).parseInt(#strings.substring(m,5,7))} + '月'"
                        th:selected="${m == selectedMonth}">2026年6月</option>
            </select>
        </form>

        <!-- 集計カード（残高・収入・支出） -->
        <div class="grid grid-cols-2 gap-3">
            <!-- 残高カード（2列ぶち抜き）。残高が0以上なら青、マイナスなら赤の背景にする -->
            <div class="col-span-2 rounded-2xl p-5 text-white shadow-sm"
                 th:classappend="${summary.balance >= 0} ? 'bg-blue-600' : 'bg-red-500'">
                <p class="text-white/80 text-sm font-medium mb-1">今月の残高</p>
                <!-- 金額を3桁区切りで表示し、先頭に ¥ を付ける -->
                <h2 class="text-3xl font-bold tracking-tight"
                    th:text="'¥' + ${#numbers.formatInteger(summary.balance, 0, 'COMMA')}">¥0</h2>
            </div>
            <!-- 収入カード -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <p class="text-gray-500 text-xs font-bold mb-1">⬆ 収入</p>
                <h2 class="text-xl font-bold text-emerald-600"
                    th:text="'¥' + ${#numbers.formatInteger(summary.income, 0, 'COMMA')}">¥0</h2>
            </div>
            <!-- 支出カード -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <p class="text-gray-500 text-xs font-bold mb-1">⬇ 支出</p>
                <h2 class="text-xl font-bold text-red-500"
                    th:text="'¥' + ${#numbers.formatInteger(summary.expense, 0, 'COMMA')}">¥0</h2>
            </div>
        </div>

        <!-- 支出の内訳（カテゴリー別の横棒） -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold mb-4 text-gray-700">🥧 支出の内訳</h3>
            <!-- データが無いときのメッセージ（breakdown が空のとき） -->
            <div th:if="${breakdown.isEmpty()}" class="text-center text-gray-400 text-sm py-8">
                支出データがありません
            </div>
            <!-- カテゴリーごとに1行ずつ表示する -->
            <div th:unless="${breakdown.isEmpty()}" class="space-y-3">
                <div th:each="slice : ${breakdown}">
                    <!-- ラベル行：色の丸・名前・金額・割合 -->
                    <div class="flex items-center justify-between text-sm mb-1">
                        <span class="flex items-center gap-2 font-medium text-gray-700">
                            <!-- カテゴリー色の丸（背景色は style にインラインで入れる） -->
                            <span class="w-3 h-3 rounded-full inline-block"
                                  th:style="'background-color:' + ${slice.color}"></span>
                            <span th:text="${slice.label}">食費</span>
                        </span>
                        <span class="font-bold text-gray-800">
                            <span th:text="'¥' + ${#numbers.formatInteger(slice.amount, 0, 'COMMA')}">¥0</span>
                            <span class="text-gray-400 text-xs" th:text="'(' + ${slice.percentage} + '%)'">(0%)</span>
                        </span>
                    </div>
                    <!-- 横棒：幅(width)を割合(%)にし、色をカテゴリー色にする -->
                    <div class="w-full bg-gray-100 rounded-full h-2.5">
                        <div class="h-2.5 rounded-full"
                             th:style="'width:' + ${slice.percentage} + '%; background-color:' + ${slice.color}"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 直近6ヶ月の推移 -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold mb-4 text-gray-700">📈 直近6ヶ月の推移</h3>
            <div class="space-y-3">
                <!-- 月ごとに1行ずつ。収入バー(緑)と支出バー(赤)を並べる -->
                <div th:each="p : ${trend}" class="text-sm">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span th:text="${p.label}">6月</span>
                        <span>
                            <span class="text-emerald-600" th:text="'収 ¥' + ${#numbers.formatInteger(p.income, 0, 'COMMA')}">収 ¥0</span>
                            <span class="text-red-500 ml-2" th:text="'支 ¥' + ${#numbers.formatInteger(p.expense, 0, 'COMMA')}">支 ¥0</span>
                        </span>
                    </div>
                    <!-- 収入バー：幅 = 収入 ÷ trendMax × 100（%） -->
                    <div class="w-full bg-gray-100 rounded-full h-2 mb-1">
                        <div class="h-2 rounded-full bg-emerald-400"
                             th:style="'width:' + ${p.income * 100 / trendMax} + '%'"></div>
                    </div>
                    <!-- 支出バー -->
                    <div class="w-full bg-gray-100 rounded-full h-2">
                        <div class="h-2 rounded-full bg-red-400"
                             th:style="'width:' + ${p.expense * 100 / trendMax} + '%'"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 下部ナビ（現在地は dashboard） -->
    <nav th:replace="~{fragments/layout :: bottomNav('dashboard')}"></nav>
</body>
</html>
