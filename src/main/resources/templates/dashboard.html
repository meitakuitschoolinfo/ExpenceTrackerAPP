<!DOCTYPE html>
<!-- Thymeleafの名前空間を宣言する -->
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<!-- 共通headフラグメントを引数 'ダッシュボード' で呼び出す -->
<head th:replace="~{fragments/layout :: head('ダッシュボード')}"></head>

<!-- 本文。下部ナビと重ならないよう下に余白(pb-24)を取る -->
<body class="min-h-screen bg-gray-50 text-gray-800 font-sans pb-24">

    <!-- 共通ヘッダー（利用者名＋ログアウト）を差し込む -->
    <header th:replace="~{fragments/layout :: appHeader(${userName})}"></header>

    <!-- メインコンテンツ -->
    <main class="max-w-3xl mx-auto p-4 space-y-6">

        <!-- 月の選択ドロップダウン -->
        <form method="get" th:action="@{/dashboard}" class="flex justify-end">
            <!-- 選んだ瞬間に送信する（onchange="this.form.submit()"）。選択肢は availableMonths -->
            <select name="month" onchange="this.form.submit()"
                    class="bg-white border border-gray-200 text-sm font-bold text-gray-700 rounded-xl px-3 py-2">
                <!-- 各月を option にする。selectedMonth と一致するものを選択状態にする -->
                <option th:each="m : ${availableMonths}" th:value="${m}"
                        th:text="${#strings.substring(m,0,4)} + '年' + ${T(java.lang.Integer).parseInt(#strings.substring(m,5,7))} + '月'"
                        th:selected="${m == selectedMonth}">2026年6月</option>
            </select>
        </form>

        <!-- 集計カード（残高・収入・支出） -->
        <div class="grid grid-cols-2 gap-3">
            <!-- 残高カード（2列ぶち抜き）。残高が0以上なら青、マイナスなら赤の背景にする -->
            <div class="col-span-2 rounded-2xl p-5 text-white shadow-sm"
                 th:classappend="${summary.balance >= 0} ? 'bg-blue-600' : 'bg-red-500'">
                <p class="text-white/80 text-sm font-medium mb-1">今月の残高</p>
                <!-- 金額を3桁区切りで表示し、先頭に ¥ を付ける -->
                <h2 class="text-3xl font-bold tracking-tight"
                    th:text="'¥' + ${#numbers.formatInteger(summary.balance, 0, 'COMMA')}">¥0</h2>
            </div>
            <!-- 収入カード -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <p class="text-gray-500 text-xs font-bold mb-1">⬆ 収入</p>
                <h2 class="text-xl font-bold text-emerald-600"
                    th:text="'¥' + ${#numbers.formatInteger(summary.income, 0, 'COMMA')}">¥0</h2>
            </div>
            <!-- 支出カード -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <p class="text-gray-500 text-xs font-bold mb-1">⬇ 支出</p>
                <h2 class="text-xl font-bold text-red-500"
                    th:text="'¥' + ${#numbers.formatInteger(summary.expense, 0, 'COMMA')}">¥0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 支出の内訳（円グラフ＝ドーナツ） -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700">🥧 支出の内訳</h3>
                <!-- データが無いときのメッセージ（breakdown が空のとき） -->
                <div th:if="${breakdown.isEmpty()}" class="h-64 flex items-center justify-center text-gray-400 text-sm">
                    支出データがありません
                </div>
                <!-- データがあるときだけ canvas を出す（Chart.jsが描画する） -->
                <div th:unless="${breakdown.isEmpty()}" class="h-64">
                    <canvas id="breakdownChart"></canvas>
                </div>
            </div>

            <!-- 直近6ヶ月の推移（折れ線グラフ） -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-gray-700">📈 直近6ヶ月の推移</h3>
                <div class="h-64">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- 下部ナビ（現在地は dashboard） -->
    <nav th:replace="~{fragments/layout :: bottomNav('dashboard')}"></nav>

    <!-- Chart.js 本体をCDNから読み込む（このダッシュボード画面でだけ使う） -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <!--/*
      サーバー（Controller）が渡した集計データを JavaScript の変数に流し込み、
      Chart.js でグラフを描画する。
      th:inline="javascript" を付けると、下の const で書いた式が JSON に変換される。
      なおこの説明文はパーサーレベルコメントにしている。通常の HTML コメントだと、
      中に書いたインライン式まで Thymeleaf が評価しようとして落ちるため。
    */-->
    <script th:inline="javascript">
    /*<![CDATA[*/
        // 支出の内訳（CategorySlice のリスト → [{label,color,amount,percentage}, ...] に変換される）
        const breakdown = /*[[${breakdown}]]*/ [];
        // 直近6ヶ月の推移（MonthlyTrendPoint のリスト → [{label,income,expense}, ...]）
        const trend = /*[[${trend}]]*/ [];

        // 金額を「¥1,234」の形に整える小さな関数（ツールチップで使う）
        const yen = (v) => '¥' + Number(v).toLocaleString('ja-JP');

        // ① 支出の内訳：円グラフ（ドーナツ型）
        const pieEl = document.getElementById('breakdownChart');
        // データが無いときは canvas 自体が存在しないので、要素がある時だけ描画する
        if (pieEl) {
            new Chart(pieEl, {
                // 'doughnut' は中央が空いた円グラフ（'pie' にすると塗りつぶしの円になる）
                type: 'doughnut',
                data: {
                    // 各カテゴリー名をラベルにする
                    labels: breakdown.map(s => s.label),
                    datasets: [{
                        // 金額を扇の大きさにする
                        data: breakdown.map(s => s.amount),
                        // 扇の色を各カテゴリーの色にする
                        backgroundColor: breakdown.map(s => s.color),
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    // 親要素(h-64)の高さに合わせて伸縮させる
                    responsive: true,
                    maintainAspectRatio: false,
                    // ドーナツの穴の大きさ
                    cutout: '60%',
                    plugins: {
                        // 凡例を下に表示する
                        legend: { position: 'bottom', labels: { font: { size: 11 } } },
                        // ツールチップに「カテゴリー名: ¥金額 (割合%)」を出す
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const slice = breakdown[ctx.dataIndex];
                                    return slice.label + ': ' + yen(slice.amount) + ' (' + slice.percentage + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        // ② 直近6ヶ月の推移：折れ線グラフ（収入＝緑、支出＝赤）
        const lineEl = document.getElementById('trendChart');
        if (lineEl) {
            new Chart(lineEl, {
                type: 'line',
                data: {
                    // 月ラベル（例：6月）を横軸にする
                    labels: trend.map(p => p.label),
                    datasets: [
                        {
                            label: '収入',
                            data: trend.map(p => p.income),
                            borderColor: '#34d399',
                            backgroundColor: 'rgba(52, 211, 153, 0.15)',
                            // 線を少し曲線にする
                            tension: 0.35,
                            // 線の下を薄く塗る
                            fill: true,
                            pointRadius: 3
                        },
                        {
                            label: '支出',
                            data: trend.map(p => p.expense),
                            borderColor: '#f87171',
                            backgroundColor: 'rgba(248, 113, 113, 0.15)',
                            tension: 0.35,
                            fill: true,
                            pointRadius: 3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 11 } } },
                        tooltip: {
                            callbacks: {
                                // ツールチップの金額を「¥1,234」表記にする
                                label: (ctx) => ctx.dataset.label + ': ' + yen(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        // 縦軸は0から始め、目盛りを「¥1,234」表記にする
                        y: {
                            beginAtZero: true,
                            ticks: { callback: (v) => yen(v) }
                        }
                    }
                }
            });
        }
    /*]]>*/
    </script>
</body>
</html>
