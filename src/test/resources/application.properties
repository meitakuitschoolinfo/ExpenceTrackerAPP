# ============================================================
#  テスト専用の設定ファイル
#  src/test/resources/application.properties は、テスト実行時だけ
#  src/main/resources/application.properties を「丸ごと上書き」する。
#  → テストでは本番のPostgreSQLには一切つながず、メモリ上のH2を使う。
#  これにより「PostgreSQLが起動していなくてもテストが通る」「毎回まっさらな
#  状態から検証できる（前のテストのデータが残らない）」という利点が得られる。
# ============================================================

# ===== データベース接続（H2 インメモリ）=====
# jdbc:h2:mem:testdb … メモリ上に "testdb" という名前のDBを作る（ファイルを残さない）
# DB_CLOSE_DELAY=-1   … 最後の接続が切れてもDBを保持する（テスト中に消えないように）
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
# H2 の JDBC ドライバ
spring.datasource.driver-class-name=org.h2.Driver
# H2 のデフォルトユーザー（sa＝system administrator）
spring.datasource.username=sa
# H2 のデフォルトパスワード（空文字）
spring.datasource.password=

# ===== JPA / Hibernate =====
# テスト開始時に Entity からテーブルを作成し、終了時に破棄する（create-drop）
spring.jpa.hibernate.ddl-auto=create-drop
# 実行SQLをコンソールに出す（テストのデバッグ用）
spring.jpa.show-sql=true
# SQLを整形して読みやすくする
spring.jpa.properties.hibernate.format_sql=true
# H2 用の方言を明示する（本番のPostgreSQLDialectが漏れてこないように上書きする）
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
